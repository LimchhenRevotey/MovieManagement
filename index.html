<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="assets/libs/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- SIDEBAR -->
    <div class="sidebar d-none d-lg-block">
        <h2 class="brand mb-5 text-warning fw-bold" style="font-family:'Bebas Neue'; letter-spacing: 2px;"><i
                class="bi bi-film"></i> LCRV-<span class="text-white">MOVIE</span></h2>
        <nav>
            <a href="#" class="nav-link active"><i class="bi bi-house-door" onclick="getAllMovies()"></i> Home</a>
            <li class="nav-item dropdown">
                <a href="#" class="nav-link dropdown-toggle" id="genreDropdown" role="button" data-bs-toggle="dropdown"
                    onclick="getGenreList()">
                    <i class="bi bi-collection-play"></i> Genre
                </a>
                <ul class="dropdown-menu" id="genreMenuList">
                    <li><a class="dropdown-item" href="#" onclick="getAllMovies()">All Genres</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                </ul>
            </li>
            <a href="#" class="nav-link" onclick="openAddModal()"><i class="bi bi-plus-circle"></i> Add Movie</a>
        </nav>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div class="position-relative w-50">
                <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 opacity-50"></i>
                <input type="text" class="form-control ps-5 py-3 border-0 rounded-4 text-warning"
                    placeholder="Search all titles ">
            </div>
            <button class="btn btn-warning fw-bold px-4 rounded-3" onclick="openAddModal()">
                <i class="bi bi-plus-circle"></i> Add New</button>
        </div>

        <!-- Featured Section -->
        <div class="featured-hero">
            <div class="w-50">
                <span class="badge bg-primary mb-3">FEATURED</span>
                <h1 class="display-3 fw-bold mb-3" style="font-family:'Bebas Neue'">INTERSTELLAR</h1>
                <p class="opacity-75 mb-4 lh-lg">When mankind is facing extinction, a group of astronauts travel through
                    a wormhole in search of a new home.</p>
                <button class="btn btn-warning fw-bold px-4 py-2 rounded-3"><i class="bi bi-play-fill"></i> Play
                    Now</button>
            </div>
        </div>

        <!-- Movie card -->
        <h4 class="fw-bold mb-4">All Movies</h4>
        <div class="row g-4" id="movieCard"></div>
        <nav class="mt-4">
            <ul class="pagination justify-content-center" id="pagination">
            </ul>
        </nav>
    </div>

    <!-- Create Modal -->
    <div class="modal fade" id="movieModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3 border-0">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalTitle">Add Movie</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="form-label text-warning small">Title</label>
                        <input type="text" id="title" class="form-control" placeholder="Enter movie title">
                        <small class="text-danger" id="titleError"></small>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label text-warning small">Release Date</label>
                            <input type="date" id="releaseDate" class="form-control " placeholder="Select release date">
                            <small class="text-danger" id="releaseDateError"></small>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label text-warning small">Rating</label>
                            <input type="number" id="rating" step="0.1" class="form-control "
                                placeholder="Rating (0-5)">
                            <small class="text-danger" id="ratingError"></small>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-warning small">Genre</label>
                        <select class="form-select custom-input" id="genre">
                            <option selected value="">Select Genre</option>
                        </select>
                        <small class="text-danger" id="genreError"></small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-warning small">Poster Image</label>
                        <input type="text" id="posterFile" class="form-control " placeholder="Enter image URL">
                        <small class="text-danger" id="posterFileError"></small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-warning small">Description</label>
                        <textarea id="description" class="form-control " rows="3"></textarea>
                        <small class="text-danger" id="descriptionError"></small>
                    </div>

                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary rounded-3 px-4"
                        data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="btnSave" class="btn btn-warning fw-bold rounded-3 px-4"
                        onclick="saveMovie()">Save
                        Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width:420px">
            <div class="modal-content bg-dark border border-secondary text-center">
                <div class="modal-body py-4 px-4">
                    <div class="fs-1 mb-2"><i class="bi bi-trash"></i></div>
                    <h5 class="text-danger fw-bold mb-1">Delete Movie?</h5>
                    <p class="text-secondary small mb-4" id="deleteMovieName"></p>
                    <div class="d-flex gap-2 justify-content-center">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="bi bi-x-lg me-1"></i>Cancel
                        </button>
                        <button class="btn btn-danger" onclick="confirmDelete()">
                            <i class="bi bi-trash me-1"></i>Yes, Delete
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
<script src="assets/libs/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>

</html>
